name: covian-ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: write

jobs:
  security-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run native adversarial tests
        run: ./scripts/test_native.sh

      - name: Build Wasm via Dockerized Emscripten
        run: ./scripts/build_wasm_docker.sh

      - name: Verify Wasm build artifacts
        run: |
          test -f js/secure_engine.generated.js
          test -f js/secure_engine.generated.wasm

      - name: Commit generated artifacts to main
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/secure_engine.generated.js js/secure_engine.generated.wasm
          git diff --staged --quiet || git commit -m "chore: update generated Wasm artifacts [skip ci]"
          git push
